<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="업무일지">
<meta name="theme-color" content="#ffffff">
<title>업무일지</title>
<style>
:root {
  --bg: #f7f6f3;
  --surface: #ffffff;
  --border: #e8e5de;
  --accent: #9b6e2a;
  --accent-light: #f5ede0;
  --green: #3d7a50;
  --green-light: #e8f4ec;
  --blue: #2a6e96;
  --blue-light: #e0eef8;
  --red: #c0392b;
  --red-light: #fdecea;
  --text: #1a1814;
  --text2: #5a5650;
  --text3: #9a9488;
  --radius: 16px;
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html { height:100%; }
body { height:100%; background:var(--bg); font-family:-apple-system,'Noto Sans KR',sans-serif; color:var(--text); overscroll-behavior:none; font-size:18px; }

/* ── 레이아웃 ── */
#app { display:flex; flex-direction:column; height:100%; width:100%; background:var(--bg); }
#views {
  flex:1;
  overflow-y:auto;
  overflow-x:hidden;
  -webkit-overflow-scrolling:touch;
  padding-bottom:140px; /* 탭바90 + 여유 */
}
.view { display:none; padding:14px 14px 0; }
.view.active { display:block; }

/* ── 탑바 ── */
.topbar {
  background:var(--surface);
  border-bottom:1px solid var(--border);
  padding:20px 18px 16px;
  display:flex; align-items:center; justify-content:space-between;
  position:sticky; top:0; z-index:10;
}
.topbar-title { font-size:24px; font-weight:700; }
.topbar-sub { font-size:16px; color:var(--text3); margin-top:3px; }

/* ── 하단 탭바 ── */
#tabbar {
  background:var(--surface);
  border-top:2px solid var(--border);
  display:flex;
  position:fixed;
  bottom:0; left:0; right:0;
  height:90px;
  padding-bottom:env(safe-area-inset-bottom, 0px);
  z-index:20;
  box-shadow:0 -3px 20px rgba(0,0,0,.12);
}
.tab-btn {
  flex:1; display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  gap:5px; background:none; border:none; cursor:pointer;
  padding:8px 0;
}
.tab-icon { font-size:32px; line-height:1; }
.tab-label { font-size:13px; font-weight:700; color:var(--text3); }
.tab-btn.active .tab-label { color:var(--accent); }
.tab-btn.active .tab-icon { transform:scale(1.15); }

/* ── 카드 ── */
.card { background:var(--surface); border-radius:var(--radius); padding:18px; margin-bottom:12px; box-shadow:0 1px 4px rgba(0,0,0,.07); }
.card-title { font-size:15px; font-weight:700; color:var(--text2); text-transform:uppercase; letter-spacing:.04em; margin-bottom:14px; }

/* ── 섹션 타이틀 ── */
.section-title { font-size:22px; font-weight:700; color:var(--text); margin-bottom:14px; display:flex; align-items:center; gap:8px; }

/* ── 큰 숫자 ── */
.big-num { font-size:52px; font-weight:700; line-height:1; }
.big-num span { font-size:24px; font-weight:400; color:var(--text3); margin-left:2px; }
.big-sub { font-size:17px; color:var(--text2); margin-top:5px; }

/* ── 목표 게이지 ── */
.goal-track { height:12px; background:var(--border); border-radius:6px; overflow:hidden; margin:12px 0 8px; }
.goal-fill { height:100%; border-radius:6px; transition:width .4s ease; }
.goal-row { display:flex; justify-content:space-between; font-size:15px; color:var(--text3); }

/* ── 버튼 ── */
.btn { display:flex; align-items:center; justify-content:center; gap:8px; border:none; border-radius:14px; font-size:19px; font-weight:700; cursor:pointer; transition:opacity .15s; padding:19px 20px; width:100%; }
.btn:active { opacity:.75; }
.btn-primary { background:var(--accent); color:#fff; }
.btn-green { background:var(--green); color:#fff; }
.btn-outline { background:var(--surface); border:2px solid var(--border); color:var(--text2); }
.btn-sm { padding:14px 18px; font-size:17px; border-radius:12px; }
.btn-row { display:flex; gap:10px; }
.btn-row .btn { flex:1; }

/* ── 입력 ── */
.input-group { margin-bottom:16px; }
.input-label { font-size:17px; font-weight:600; color:var(--text2); margin-bottom:9px; display:block; }
.inp {
  width:100%;
  background:var(--bg);
  border:2px solid var(--border);
  border-radius:12px;
  padding:15px 16px;
  font-size:18px;
  color:var(--text);
  outline:none;
  -webkit-appearance:none;
  line-height:1.4;
}
.inp:focus { border-color:var(--accent); }
textarea.inp { min-height:90px; resize:none; }
select.inp { cursor:pointer; }
.inp-row { display:flex; gap:10px; align-items:center; }
.inp-sep { color:var(--text3); font-size:18px; flex-shrink:0; font-weight:300; }

/* ── 엔트리 ── */
.entry { background:var(--bg); border-radius:14px; padding:16px; margin-bottom:10px; display:flex; gap:14px; align-items:flex-start; }
.entry-time { font-size:14px; color:var(--text3); min-width:88px; flex-shrink:0; line-height:1.5; }
.entry-time b { display:block; font-size:20px; color:var(--accent); font-weight:700; margin-bottom:2px; }
.entry-body { flex:1; }
.entry-cat { display:inline-block; font-size:13px; font-weight:700; padding:4px 11px; border-radius:7px; margin-bottom:5px; }
.entry-text { font-size:17px; color:var(--text); line-height:1.5; }
.entry-del { background:none; border:none; color:var(--text3); font-size:24px; cursor:pointer; padding:0 2px; flex-shrink:0; line-height:1; }

/* ── 운동 버튼 ── */
.ex-btns { display:grid; grid-template-columns:1fr 1fr 1fr; gap:12px; margin-bottom:18px; }
.ex-btn { border:2.5px solid var(--border); border-radius:16px; background:var(--bg); padding:24px 8px; font-size:17px; font-weight:700; cursor:pointer; display:flex; flex-direction:column; align-items:center; gap:10px; transition:all .15s; color:var(--text2); }
.ex-btn .ex-icon { font-size:42px; }
.ex-btn:active { transform:scale(.95); }
.ex-btn.sel-done { border-color:var(--green); background:var(--green-light); color:var(--green); }
.ex-btn.sel-skip { border-color:var(--red); background:var(--red-light); color:var(--red); }
.ex-btn.sel-holiday { border-color:var(--blue); background:var(--blue-light); color:var(--blue); }

/* ── 일기 ── */
.mood-row { display:flex; gap:10px; justify-content:center; margin-bottom:18px; }
.mood-btn { width:64px; height:64px; border-radius:16px; border:2.5px solid var(--border); background:var(--bg); font-size:34px; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all .15s; }
.mood-btn.sel { border-color:var(--accent); background:var(--accent-light); transform:scale(1.12); }
.diary-section { margin-bottom:16px; }
.top3-item { display:flex; align-items:center; gap:12px; padding:13px 0; border-bottom:1px solid var(--border); }
.top3-item:last-child { border-bottom:none; }
.top3-num { font-size:17px; font-weight:700; color:var(--accent); min-width:22px; }
.top3-check { width:28px; height:28px; border-radius:8px; border:2px solid var(--border); background:var(--bg); cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:16px; flex-shrink:0; transition:all .15s; }
.top3-check.done { background:var(--green); border-color:var(--green); color:#fff; }
.top3-text { flex:1; font-size:18px; }
.top3-text.done { text-decoration:line-through; color:var(--text3); }

/* ── 매출 ── */
.sales-summary { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:14px; }
.stat-mini { background:var(--bg); border-radius:14px; padding:16px; }
.stat-mini-label { font-size:14px; color:var(--text3); margin-bottom:5px; font-weight:600; }
.stat-mini-val { font-size:26px; font-weight:700; }
.company-bar { margin-bottom:12px; }
.company-bar-top { display:flex; justify-content:space-between; align-items:baseline; margin-bottom:6px; }
.company-bar-name { font-size:17px; font-weight:700; }
.company-bar-val { font-size:17px; font-weight:700; }
.bar-track { height:10px; background:var(--border); border-radius:5px; overflow:hidden; }
.bar-fill { height:100%; border-radius:5px; }

/* ── 히스토리 ── */
.hist-day { margin-bottom:18px; }
.hist-day-head { font-size:17px; font-weight:600; color:var(--text3); margin-bottom:10px; display:flex; justify-content:space-between; }
.hist-day-total { color:var(--accent); font-weight:700; }

/* ── 월별 통계 ── */
.month-tabs { display:flex; overflow-x:auto; gap:8px; padding-bottom:2px; margin-bottom:16px; -webkit-overflow-scrolling:touch; scrollbar-width:none; }
.month-tabs::-webkit-scrollbar { display:none; }
.month-tab { flex-shrink:0; padding:11px 18px; border-radius:22px; border:2px solid var(--border); background:var(--surface); font-size:16px; font-weight:600; color:var(--text3); cursor:pointer; }
.month-tab.active { background:var(--accent); border-color:var(--accent); color:#fff; }
.month-tab.has-data { border-color:var(--accent); color:var(--accent); }

/* ── HOME TOP3 ── */
.home-top3-item { display:flex; align-items:center; gap:14px; padding:13px 0; border-bottom:1px solid var(--border); }
.home-top3-item:last-child { border-bottom:none; }
.home-top3-num { font-size:18px; font-weight:700; color:var(--accent); min-width:22px; }
.home-top3-check { width:30px; height:30px; border-radius:9px; border:2px solid var(--border); background:var(--bg); cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:18px; flex-shrink:0; transition:all .15s; }
.home-top3-check.done { background:var(--green); border-color:var(--green); color:#fff; }
.home-top3-text { flex:1; font-size:18px; color:var(--text); line-height:1.4; }
.home-top3-text.done { text-decoration:line-through; color:var(--text3); }

/* ── 차트 ── */
canvas { display:block; width:100% !important; }

/* ── 연결 배너 ── */
.connect-banner { background:#fff8e8; border:2px solid var(--accent); border-radius:14px; padding:16px; margin-bottom:14px; display:flex; align-items:center; gap:14px; }
.connect-banner-text { flex:1; font-size:15px; color:var(--text2); line-height:1.5; }
.connect-banner-btn { background:var(--accent); color:#fff; border:none; border-radius:10px; padding:12px 16px; font-size:15px; font-weight:700; cursor:pointer; flex-shrink:0; }

/* ── 모달 ── */
.modal-bg { display:none; position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:100; align-items:flex-end; }
.modal-bg.open { display:flex; }
.modal { background:var(--surface); border-radius:22px 22px 0 0; padding:24px 20px 40px; width:100%; max-height:90vh; overflow-y:auto; }
.modal-handle { width:40px; height:5px; background:var(--border); border-radius:3px; margin:0 auto 22px; }
.modal-title { font-size:22px; font-weight:700; margin-bottom:20px; }
.modal-close { float:right; background:none; border:none; font-size:28px; color:var(--text3); cursor:pointer; margin-top:-6px; }
.api-inp { width:100%; background:var(--bg); border:2px solid var(--border); border-radius:12px; padding:15px 16px; font-size:17px; color:var(--text); outline:none; margin-bottom:12px; }
.api-inp:focus { border-color:var(--accent); }
.api-result { font-size:14px; color:var(--text3); margin-top:10px; min-height:20px; }

/* ── 토스트 ── */
#toast { position:fixed; bottom:110px; left:50%; transform:translateX(-50%); background:#1a1814ee; color:#fff; font-size:15px; font-weight:600; padding:14px 24px; border-radius:28px; z-index:200; opacity:0; transition:opacity .2s; pointer-events:none; white-space:nowrap; }
#toast.show { opacity:1; }

/* ── 빈 상태 ── */
.empty { text-align:center; padding:48px 20px; color:var(--text3); font-size:18px; }
.empty-icon { font-size:56px; margin-bottom:16px; }
.loading { text-align:center; padding:32px; color:var(--text3); font-size:18px; }
.badge { display:inline-block; font-size:12px; font-weight:600; padding:3px 10px; border-radius:7px; }
</style>
</head>
<body>
<div id="app">

  <!-- TOP BAR -->
  <div class="topbar" id="topbar">
    <div>
      <div class="topbar-title" id="topbar-title">오늘의 업무</div>
      <div class="topbar-sub" id="topbar-sub"></div>
    </div>
    <div id="topbar-right"></div>
  </div>

  <!-- VIEWS -->
  <div id="views">

    <!-- ① 홈 (오늘 업무) -->
    <div class="view active" id="view-home">
      <!-- 연결 배너 -->
      <div class="connect-banner" id="connect-banner" style="display:none;">
        <div class="connect-banner-text">☁️ Sheets 미연결<br><small>지금은 기기에만 저장돼요</small></div>
        <button class="connect-banner-btn" onclick="openApiModal()">연결</button>
      </div>

      <!-- 오늘 TOP3 (어제 일기에서) -->
      <div id="home-top3-wrap" style="display:none;">
        <div class="card" style="border-left:4px solid var(--accent);padding-left:14px;">
          <div class="card-title" style="color:var(--accent);margin-bottom:10px;">📋 오늘 할 일 TOP3</div>
          <div id="home-top3-list"></div>
        </div>
      </div>

      <!-- 오늘 달성률 -->
      <div class="card">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;">
          <div>
            <div class="big-num" id="home-total">0<span>h 00m</span></div>
            <div class="big-sub">오늘 업무시간</div>
          </div>
          <svg width="64" height="64" viewBox="0 0 64 64" style="flex-shrink:0;">
            <circle cx="32" cy="32" r="26" fill="none" stroke="#e8e5de" stroke-width="6"/>
            <circle cx="32" cy="32" r="26" fill="none" id="home-arc"
              stroke="#9b6e2a" stroke-width="6" stroke-linecap="round"
              stroke-dasharray="163.4" stroke-dashoffset="163.4"
              transform="rotate(-90 32 32)"
              style="transition:stroke-dashoffset .5s ease;"/>
            <text x="32" y="37" text-anchor="middle" font-size="12" font-weight="700" fill="#1a1814" id="home-pct">0%</text>
          </svg>
        </div>
        <div class="goal-track">
          <div class="goal-fill" id="home-goal-fill" style="width:0%;background:#9b6e2a;"></div>
        </div>
        <div class="goal-row">
          <span id="home-remain" style="color:#5a5650;">목표까지 8h 남음</span>
          <span style="font-weight:600;" id="home-goal-label">목표 8h</span>
        </div>
      </div>

      <!-- 기록 추가 -->
      <div class="card">
        <div class="card-title">+ 업무 기록</div>
        <div class="input-group">
          <label class="input-label">날짜</label>
          <input type="date" class="inp" id="w-date">
        </div>
        <div class="input-group">
          <label class="input-label">시간</label>
          <div class="inp-row">
            <input type="text" class="inp" id="w-start" style="flex:1;" placeholder="09:00" maxlength="5" inputmode="numeric" oninput="fmtTimeInput(this)">
            <span class="inp-sep">~</span>
            <input type="text" class="inp" id="w-end" style="flex:1;" placeholder="18:00" maxlength="5" inputmode="numeric" oninput="fmtTimeInput(this)">
          </div>
        </div>
        <div class="input-group">
          <label class="input-label">카테고리</label>
          <select class="inp" id="w-cat">
            <option value="소싱">소싱</option>
            <option value="상품등록">상품등록</option>
            <option value="주문처리">주문처리</option>
            <option value="툴개발">툴개발</option>
            <option value="CS/운영">CS/운영</option>
            <option value="마케팅">마케팅</option>
            <option value="행정/기타">행정/기타</option>
          </select>
        </div>
        <div class="input-group">
          <label class="input-label">내용</label>
          <textarea class="inp" id="w-content" placeholder="무엇을 했나요?"></textarea>
        </div>
        <button class="btn btn-primary" onclick="addWork()">💾 저장</button>
      </div>

      <!-- 오늘 기록 목록 -->
      <div class="section-title">오늘 기록</div>
      <div id="home-entries"></div>
    </div>

    <!-- ② 히스토리 -->
    <div class="view" id="view-history">
      <div class="section-title">업무 히스토리</div>
      <div class="btn-row" style="margin-bottom:16px;">
        <button class="btn btn-outline btn-sm" id="hist-btn-week" onclick="setHistTab('week')">이번 주</button>
        <button class="btn btn-outline btn-sm" id="hist-btn-month" onclick="setHistTab('month')">이번 달</button>
        <button class="btn btn-outline btn-sm" id="hist-btn-all" onclick="setHistTab('all')">전체</button>
      </div>
      <div id="history-list"></div>
    </div>

    <!-- ③ 통계 -->
    <div class="view" id="view-stats">
      <div class="section-title">월별 통계</div>
      <!-- 연도 선택 -->
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px;">
        <button class="btn btn-outline btn-sm" style="width:auto;padding:8px 14px;" onclick="statsYearShift(-1)">‹</button>
        <span id="stats-year-label" style="font-size:16px;font-weight:700;flex:1;text-align:center;"></span>
        <button class="btn btn-outline btn-sm" style="width:auto;padding:8px 14px;" onclick="statsYearShift(1)">›</button>
      </div>
      <!-- 월 탭 -->
      <div class="month-tabs" id="stats-month-tabs"></div>
      <!-- 요약 카드 -->
      <div class="sales-summary" id="stats-summary"></div>
      <!-- 차트 -->
      <div class="card">
        <div class="card-title" id="stats-chart-title">일별 업무시간</div>
        <canvas id="stats-line-chart" height="160"></canvas>
      </div>
      <!-- 카테고리 -->
      <div class="card">
        <div class="card-title">카테고리별</div>
        <div id="stats-cat-bars"></div>
      </div>
    </div>

    <!-- ④ 매출 -->
    <div class="view" id="view-sales">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:14px;flex-wrap:wrap;">
        <select class="inp" id="sales-year" style="flex:1;min-width:90px;" onchange="loadSales()">
          <option value="2026">2026년</option>
          <option value="2025">2025년</option>
        </select>
        <select class="inp" id="sales-month" style="flex:1;min-width:90px;" onchange="loadSales()">
          <option value="">전체</option>
          <option value="1">1월</option><option value="2">2월</option><option value="3">3월</option>
          <option value="4">4월</option><option value="5">5월</option><option value="6">6월</option>
          <option value="7">7월</option><option value="8">8월</option><option value="9">9월</option>
          <option value="10">10월</option><option value="11">11월</option><option value="12">12월</option>
        </select>
        <button class="btn btn-primary btn-sm" style="width:auto;" onclick="loadSales()">🔄</button>
      </div>
      <div id="sales-loading" class="loading" style="display:none;">불러오는 중...</div>
      <div id="sales-error" style="display:none;background:var(--red-light);border-radius:12px;padding:14px;font-size:14px;color:var(--red);margin-bottom:12px;"></div>
      <div id="sales-content"></div>
    </div>

    <!-- ⑤ 일기 -->
    <div class="view" id="view-diary">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px;">
        <input type="date" class="inp" id="diary-date" style="flex:1;">
        <button class="btn btn-outline btn-sm" style="width:auto;" onclick="diaryGoToday()">오늘</button>
      </div>

      <!-- 어제 TOP3 -->
      <div id="yesterday-top3-wrap" style="display:none;">
        <div class="section-title" style="font-size:14px;">어제 TOP3 달성 체크</div>
        <div class="card" style="padding:12px 16px;">
          <div id="yesterday-top3-list"></div>
        </div>
      </div>

      <!-- 컨디션 -->
      <div class="card">
        <div class="card-title">오늘 컨디션</div>
        <div class="mood-row">
          <button class="mood-btn" data-mood="1" onclick="setMood(1)">😩</button>
          <button class="mood-btn" data-mood="2" onclick="setMood(2)">😕</button>
          <button class="mood-btn" data-mood="3" onclick="setMood(3)">😐</button>
          <button class="mood-btn" data-mood="4" onclick="setMood(4)">😊</button>
          <button class="mood-btn" data-mood="5" onclick="setMood(5)">🔥</button>
        </div>

<!-- 토스트 -->
<div id="toast"></div>

<script>
/* ══ 상수 ══ */
const CATS = ['소싱','상품등록','주문처리','툴개발','CS/운영','마케팅','행정/기타'];
const CAT_COLORS = {'소싱':'#9b6e2a','상품등록':'#3d7a50','주문처리':'#c87a30','툴개발':'#2a6e96','CS/운영':'#963a6a','마케팅':'#6a3a96','행정/기타':'#2a8a7a'};
const MOOD_EMOJI = ['','😩','😕','😐','😊','🔥'];
const DOW = ['일','월','화','수','목','금','토'];
const GOAL = 480; // 8h in minutes
const EX_GOAL = 0.8;

/* ══ 스토리지 ══ */
const LS = key => JSON.parse(localStorage.getItem(key)||'[]');
const SS = (key,v) => localStorage.setItem(key, JSON.stringify(v));
const loadWork = () => LS('work_diary_v1');
const saveWork = d => SS('work_diary_v1', d);
const loadEx   = () => LS('exercise_log_v1');
const saveEx_  = d => SS('exercise_log_v1', d);
const loadDiary= () => LS('diary_v1');
const saveDiary_= d => SS('diary_v1', d);
const getApi   = () => localStorage.getItem('sheets_api_url') || '';

/* ══ 날짜 ══ */
const toDate = d => { const y=d.getFullYear(),m=String(d.getMonth()+1).padStart(2,'0'),dd=String(d.getDate()).padStart(2,'0'); return `${y}-${m}-${dd}`; };
const toTime = d => d.toTimeString().slice(0,5);
const parseD = s => new Date(s+'T00:00:00');
const fmtD   = d => `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}`;
const isWE   = d => d.getDay()===0||d.getDay()===6;

function calcMins(s,e){
  const [sh,sm]=s.split(':').map(Number),[eh,em]=e.split(':').map(Number);
  const d=(eh*60+em)-(sh*60+sm); return d>0?d:0;
}
function fmtM(m){ const h=Math.floor(m/60),mm=m%60; if(!h)return`${mm}m`; if(!mm)return`${h}h`; return`${h}h ${mm}m`; }
function fmtMoney(n){ return (n||0).toLocaleString()+'원'; }
function fmtMoneyFull(n){ return (n||0).toLocaleString()+'원'; }
function escH(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>'); }

/* ══ 토스트 ══ */
let toastTimer;
function toast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.classList.remove('show'),2000); }

/* ══ 탭 전환 ══ */
let currentTab = 'home';
function switchTab(tab){
  currentTab = tab;
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('view-'+tab).classList.add('active');
  document.getElementById('tab-'+tab).classList.add('active');
  const titles = {home:'오늘의 업무',history:'업무 히스토리',stats:'월별 통계',sales:'매출 대시보드',diary:'사업 일기',exercise:'운동 출석'};
  document.getElementById('topbar-title').textContent = titles[tab]||'';
  document.getElementById('topbar-right').innerHTML = tab==='home'?`<button onclick="openApiModal()" style="background:none;border:none;font-size:22px;cursor:pointer;">⚙️</button>`:'';
  if(tab==='home') renderHome();
  if(tab==='history') renderHistory();
  if(tab==='stats') renderStats();
  if(tab==='sales') { if(!salesCache) loadSales(); }
  if(tab==='diary') initDiary();
  if(tab==='exercise') renderExercise();
}

/* ══ 시간 입력 자동 포맷 ══ */
function fmtTimeInput(el) {
  let v = el.value.replace(/[^0-9]/g, '');
  if (v.length > 4) v = v.slice(0, 4);
  if (v.length >= 3) {
    v = v.slice(0, 2) + ':' + v.slice(2);
  }
  el.value = v;
}

function parseTimeVal(v) {
  // HH:MM 또는 HHMM 형식 모두 허용
  v = v.replace(/[^0-9:]/g, '');
  if (v.includes(':')) return v;
  if (v.length === 4) return v.slice(0,2) + ':' + v.slice(2);
  if (v.length === 3) return '0' + v.slice(0,1) + ':' + v.slice(1);
  return v;
}

/* ══ 초기화 ══ */
function init(){
  const now = new Date();
  document.getElementById('topbar-sub').textContent = fmtD(now)+' '+DOW[now.getDay()]+'요일';
  document.getElementById('w-date').value = toDate(now);
  document.getElementById('w-start').value = toTime(now);
  document.getElementById('w-end').value = toTime(now);
  document.getElementById('diary-date').value = toDate(now);
  document.getElementById('diary-date').onchange = function(){ loadDiaryForDate(this.value); };
  document.getElementById('ex-past-date').value = toDate(now);
  document.getElementById('sales-year').value = String(now.getFullYear());
  document.getElementById('sales-month').value = String(now.getMonth()+1);
  statsYear = now.getFullYear();
  statsMonth = now.getMonth();
  updateConnectBanner();
  renderHome();
  if(getApi()) loadFromSheets();
}

/* ══ Sheets 연동 ══ */
async function loadFromSheets(){
  const url=getApi(); if(!url)return;
  try{
    const r=await fetch(url+'?action=getAll');
    const d=await r.json();
    if(d.error)throw new Error(d.error);
    if(d.work) saveWork(d.work);
    if(d.exercise) saveEx_(d.exercise.map(e=>({date:e.date,status:e.status})));
    if(d.diary) saveDiary_(d.diary);
    renderHome();
    toast('✓ 데이터 동기화 완료');
  }catch(e){ console.error(e); }
}
async function sheetsUpsert(sheet,key,rec){
  const url=getApi(); if(!url)return;
  try{ await fetch(url,{method:'POST',body:JSON.stringify({action:'upsert',sheet,key,record:rec}),headers:{'Content-Type':'application/json'}}); }catch(e){}
}
async function sheetsDelete(sheet,key,val){
  const url=getApi(); if(!url)return;
  try{ await fetch(url,{method:'POST',body:JSON.stringify({action:'delete',sheet,key,keyValue:String(val)}),headers:{'Content-Type':'application/json'}}); }catch(e){}
}

/* ══ API 모달 ══ */
function openApiModal(){ document.getElementById('api-modal-bg').classList.add('open'); document.getElementById('api-url-inp').value=getApi(); document.getElementById('api-result').textContent=''; }
function closeApiModal(){ document.getElementById('api-modal-bg').classList.remove('open'); }
async function saveApiUrl(){
  const url=document.getElementById('api-url-inp').value.trim();
  if(!url)return;
  localStorage.setItem('sheets_api_url',url);
  updateConnectBanner();
  document.getElementById('api-result').textContent='✓ 저장됨. 데이터 불러오는 중...';
  closeApiModal();
  await loadFromSheets();
}
async function testApiUrl(){
  const url=document.getElementById('api-url-inp').value.trim();
  const res=document.getElementById('api-result');
  if(!url){res.textContent='URL을 입력해주세요.';return;}
  res.textContent='테스트 중...';
  try{
    const r=await fetch(url+'?action=getAll');
    const d=await r.json();
    if(d.error){res.textContent='❌ 오류: '+d.error;res.style.color='var(--red)';}
    else{res.textContent='✓ 연결 성공! 업무 '+d.work.length+'건';res.style.color='var(--green)';}
  }catch(e){res.textContent='❌ 실패: '+e.message;res.style.color='var(--red)';}
}
async function migrateData(){
  const url=document.getElementById('api-url-inp').value.trim();
  const res=document.getElementById('api-result');
  res.textContent='이전 중...';
  try{
    const r=await fetch(url,{method:'POST',body:JSON.stringify({action:'saveAll',work:loadWork(),exercise:loadEx(),diary:loadDiary()}),headers:{'Content-Type':'application/json'}});
    const d=await r.json();
    if(d.error)throw new Error(d.error);
    res.textContent='✓ 이전 완료!';res.style.color='var(--green)';
    localStorage.setItem('sheets_api_url',url);
    updateConnectBanner();
  }catch(e){res.textContent='❌ 실패: '+e.message;res.style.color='var(--red)';}
}
function updateConnectBanner(){
  const banner=document.getElementById('connect-banner');
  if(banner) banner.style.display = getApi()?'none':'flex';
}

/* ══ 홈 (오늘 업무) ══ */
function renderHome(){
  const today=toDate(new Date());
  const data=loadWork().filter(e=>e.date===today).sort((a,b)=>a.start.localeCompare(b.start));
  renderHomeTop3();
  const total=data.reduce((s,e)=>s+(Number(e.duration)||0),0);
  const pct=Math.min(Math.round(total/GOAL*100),100);
  const over=total>GOAL;
  const color=pct>=100?'#3d7a50':pct>=50?'#9b6e2a':'#2a6e96';

  document.getElementById('home-total').innerHTML=`${Math.floor(total/60)}<span>h ${String(total%60).padStart(2,'0')}m</span>`;
  document.getElementById('home-goal-fill').style.width=pct+'%';
  document.getElementById('home-goal-fill').style.background=color;
  document.getElementById('home-pct').textContent=pct+'%';
  document.getElementById('home-pct').style.fill=color;
  const circ=163.4;
  document.getElementById('home-arc').style.strokeDashoffset=circ-(circ*pct/100);
  document.getElementById('home-arc').style.stroke=color;
  document.getElementById('home-remain').textContent = over?`🎉 +${fmtM(total-GOAL)} 초과`:`목표까지 ${fmtM(Math.max(GOAL-total,0))} 남음`;

  const el=document.getElementById('home-entries');
  if(!data.length){ el.innerHTML='<div class="empty"><div class="empty-icon">📋</div>아직 오늘 기록이 없어요</div>'; return; }
  el.innerHTML=data.map(e=>{
    const c=CAT_COLORS[e.category]||'#888';
    return`<div class="entry">
      <div class="entry-time"><b>${fmtM(Number(e.duration)||0)}</b>${e.start}~${e.end}</div>
      <div class="entry-body">
        <span class="entry-cat" style="background:${c}22;color:${c};">${e.category}</span>
        <div class="entry-text">${escH(e.content)}</div>
      </div>
      <button class="entry-del" onclick="deleteWork(${e.id})">✕</button>
    </div>`;
  }).join('');
}

function renderHomeTop3(){
  // 오늘 일기에서 TOP3 가져오기
  const today = toDate(new Date());
  const map = {}; loadDiary().forEach(e=>map[e.date]=e);
  const rec = map[today];
  const wrap = document.getElementById('home-top3-wrap');
  const list = document.getElementById('home-top3-list');
  if(!rec||(!rec.top1&&!rec.top2&&!rec.top3)){
    wrap.style.display='none'; return;
  }
  wrap.style.display='block';
  const tops=[rec.top1,rec.top2,rec.top3].filter(Boolean);
  list.innerHTML=tops.map((t,i)=>{
    const key='top'+(i+1);
    const done=rec.checks&&rec.checks[key];
    return`<div class="home-top3-item">
      <span class="home-top3-num">${i+1}</span>
      <div class="home-top3-check${done?' done':''}" onclick="toggleHomeTop3('${today}','${key}')">${done?'✓':''}</div>
      <span class="home-top3-text${done?' done':''}">${escH(t)}</span>
    </div>`;
  }).join('');
}

function toggleHomeTop3(date, key){
  const data = loadDiary();
  const rec = data.find(e=>e.date===date);
  if(!rec) return;
  rec.checks = rec.checks || {};
  rec.checks[key] = !rec.checks[key];
  saveDiary_(data);
  if(getApi()){const sr=Object.assign({},rec);if(sr.checks)sr.checks=JSON.stringify(sr.checks);sheetsUpsert('diary','date',sr);}
  renderHomeTop3();
}

function addWork(){
  const date=document.getElementById('w-date').value;
  const start=parseTimeVal(document.getElementById('w-start').value);
  const end=parseTimeVal(document.getElementById('w-end').value);
  const cat=document.getElementById('w-cat').value;
  const content=document.getElementById('w-content').value.trim();
  if(!date||!start||!end){toast('날짜와 시간을 입력해주세요');return;}
  const mins=calcMins(start,end);
  if(mins<=0){toast('종료 시간이 시작보다 늦어야 해요');return;}
  const rec={id:Date.now(),date,start,end,duration:mins,category:cat,content};
  const data=loadWork(); data.push(rec); saveWork(data);
  if(getApi()) sheetsUpsert('work_entries','id',rec);
  document.getElementById('w-content').value='';
  document.getElementById('w-start').value=parseTimeVal(end);
  document.getElementById('w-end').value=parseTimeVal(end);
  toast('✓ 저장됐어요');
  renderHome();
}

function deleteWork(id){
  if(!confirm('삭제할까요?'))return;
  saveWork(loadWork().filter(e=>e.id!==id));
  if(getApi()) sheetsDelete('work_entries','id',id);
  renderHome();
  toast('삭제됐어요');
}

/* ══ 히스토리 ══ */
let histTab='week';
function setHistTab(t){
  histTab=t;
  ['week','month','all'].forEach(x=>{
    const b=document.getElementById('hist-btn-'+x);
    if(b){b.style.background=x===t?'var(--accent)':'var(--surface)';b.style.color=x===t?'#fff':'var(--text2)';b.style.borderColor=x===t?'var(--accent)':'var(--border)';}
  });
  renderHistory();
}

function renderHistory(){
  const now=new Date(), data=loadWork();
  let filtered=data;
  if(histTab==='week'){
    const ws=new Date(now); ws.setDate(ws.getDate()-ws.getDay()+1); ws.setHours(0,0,0,0);
    filtered=data.filter(e=>e.date>=toDate(ws));
  } else if(histTab==='month'){
    const ms=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
    filtered=data.filter(e=>e.date.startsWith(ms));
  }
  const byDate={};
  filtered.forEach(e=>{(byDate[e.date]=byDate[e.date]||[]).push(e);});
  const dates=Object.keys(byDate).sort((a,b)=>b.localeCompare(a));
  const el=document.getElementById('history-list');
  if(!dates.length){el.innerHTML='<div class="empty"><div class="empty-icon">📂</div>기록이 없어요</div>';return;}
  el.innerHTML=dates.map(date=>{
    const entries=byDate[date].sort((a,b)=>a.start.localeCompare(b.start));
    const total=entries.reduce((s,e)=>s+(Number(e.duration)||0),0);
    const d=parseD(date);
    return`<div class="hist-day">
      <div class="hist-day-head">
        <span>${fmtD(d)} ${DOW[d.getDay()]}요일</span>
        <span class="hist-day-total">${fmtM(total)}</span>
      </div>
      ${entries.map(e=>{
        const c=CAT_COLORS[e.category]||'#888';
        return`<div class="entry">
          <div class="entry-time"><b>${fmtM(Number(e.duration)||0)}</b>${e.start}~${e.end}</div>
          <div class="entry-body">
            <span class="entry-cat" style="background:${c}22;color:${c};">${e.category}</span>
            <div class="entry-text">${escH(e.content)}</div>
          </div>
          <button class="entry-del" onclick="deleteWork(${e.id});renderHistory();">✕</button>
        </div>`;
      }).join('')}
    </div>`;
  }).join('');
}

/* ══ 통계 ══ */

function renderStats(){
  document.getElementById('stats-year-label').textContent=statsYear+'년';
  const data=loadWork();
  // 월 탭
  const tabsEl=document.getElementById('stats-month-tabs');
  tabsEl.innerHTML=Array.from({length:12},(_,i)=>{
    const prefix=`${statsYear}-${String(i+1).padStart(2,'0')}`;
    const has=data.some(e=>e.date.startsWith(prefix));
    const isActive=i===statsMonth;
    return`<button class="month-tab${isActive?' active':''}${has&&!isActive?' has-data':''}" onclick="statsMonth=${i};renderStats()">${i+1}월</button>`;
  }).join('');

  const prefix=`${statsYear}-${String(statsMonth+1).padStart(2,'0')}`;
  const monthData=data.filter(e=>e.date.startsWith(prefix));
  const dim=new Date(statsYear,statsMonth+1,0).getDate();
  const days=Array.from({length:dim},(_,i)=>{
    const ds=`${statsYear}-${String(statsMonth+1).padStart(2,'0')}-${String(i+1).padStart(2,'0')}`;
    const entries=monthData.filter(e=>e.date===ds);
    return{ds,entries,total:entries.reduce((s,e)=>s+(Number(e.duration)||0),0)};
  });
  const totalMonth=days.reduce((s,d)=>s+d.total,0);
  const activeDays=days.filter(d=>d.total>0).length;
  const achievedDays=days.filter(d=>d.total>=GOAL).length;
  const avgMins=activeDays?Math.round(totalMonth/activeDays):0;

  document.getElementById('stats-summary').innerHTML=`
    <div class="stat-mini"><div class="stat-mini-label">총 시간</div><div class="stat-mini-val" style="color:var(--accent);">${fmtM(totalMonth)}</div></div>
    <div class="stat-mini"><div class="stat-mini-label">8h 달성</div><div class="stat-mini-val" style="color:var(--green);">${achievedDays}일</div></div>
    <div class="stat-mini"><div class="stat-mini-label">활동일 평균</div><div class="stat-mini-val">${avgMins?fmtM(avgMins):'—'}</div></div>
    <div class="stat-mini"><div class="stat-mini-label">활동일수</div><div class="stat-mini-val">${activeDays}일</div></div>`;

  document.getElementById('stats-chart-title').textContent=`${statsYear}년 ${statsMonth+1}월 일별 업무시간`;
  drawStatsLine(days);

  // 카테고리
  const catTotals={};CATS.forEach(c=>catTotals[c]=0);
  monthData.forEach(e=>{if(catTotals[e.category]!==undefined)catTotals[e.category]+=Number(e.duration)||0;});
  const maxCat=Math.max(...Object.values(catTotals),1);
  const filtered=CATS.filter(c=>catTotals[c]>0);
  document.getElementById('stats-cat-bars').innerHTML=filtered.length===0
    ?'<div style="color:var(--text3);font-size:14px;">기록 없음</div>'
    :filtered.map(cat=>`
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;">
        <div style="min-width:70px;font-size:13px;font-weight:600;color:var(--text2);">${cat}</div>
        <div style="flex:1;height:8px;background:var(--border);border-radius:4px;overflow:hidden;">
          <div style="width:${(catTotals[cat]/maxCat*100).toFixed(1)}%;height:100%;background:${CAT_COLORS[cat]};border-radius:4px;"></div>
        </div>
        <div style="min-width:44px;text-align:right;font-size:13px;font-weight:600;color:${CAT_COLORS[cat]};">${fmtM(catTotals[cat])}</div>
      </div>`).join('');
}

function drawStatsLine(days){
  const canvas=document.getElementById('stats-line-chart');
  if(!canvas)return;
  const dpr=window.devicePixelRatio||1;
  const W=canvas.parentElement.clientWidth;
  const H=160;
  canvas.style.width=W+'px';canvas.style.height=H+'px';
  canvas.width=W*dpr;canvas.height=H*dpr;
  const ctx=canvas.getContext('2d');ctx.scale(dpr,dpr);
  const pad={t:10,r:10,b:28,l:36};
  const cw=W-pad.l-pad.r,ch=H-pad.t-pad.b;
  const maxMins=Math.max(...days.map(d=>d.total),GOAL,1);
  const n=days.length;
  const barW=Math.max(Math.floor(cw/n*0.6),2);
  const gap=cw/n;
  const todayStr=toDate(new Date());
  ctx.clearRect(0,0,W,H);

  // grid
  [0,0.5,1].forEach(f=>{
    const y=pad.t+ch-ch*f*(GOAL/maxMins);
    ctx.strokeStyle='#e8e5de';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(pad.l,y);ctx.lineTo(pad.l+cw,y);ctx.stroke();
    ctx.fillStyle='#9a9488';ctx.font='9px -apple-system,sans-serif';ctx.textAlign='right';
    ctx.fillText(Math.round(GOAL*f/60)+'h',pad.l-3,y+3);
  });
  // goal line
  const gy=pad.t+ch-ch*(GOAL/maxMins);
  ctx.strokeStyle='#9b6e2a44';ctx.lineWidth=1.5;ctx.setLineDash([4,3]);
  ctx.beginPath();ctx.moveTo(pad.l,gy);ctx.lineTo(pad.l+cw,gy);ctx.stroke();ctx.setLineDash([]);

  // bars
  days.forEach((d,i)=>{
    const x=pad.l+gap*i+(gap-barW)/2;
    const pct=d.total/GOAL*100;
    const isToday=d.ds===todayStr;
    if(d.total>0){
      const barH=ch*(d.total/maxMins);
      const col=pct>=100?'#3d7a50':pct>=50?'#9b6e2a':'#2a6e96';
      ctx.fillStyle=col+(isToday?'ff':'99');
      ctx.beginPath();
      ctx.roundRect(x,pad.t+ch-barH,barW,barH,2);
      ctx.fill();
    }
    // x label (5일마다)
    if(d.ds.slice(-2)==='01'||(parseInt(d.ds.slice(-2)))%5===0){
      ctx.fillStyle=isToday?'#9b6e2a':'#9a9488';
      ctx.font=(isToday?'bold ':'')+' 8px -apple-system,sans-serif';
      ctx.textAlign='center';
      ctx.fillText(parseInt(d.ds.slice(-2))+'일',x+barW/2,H-pad.b+12);
    }
  });
}

function drawSalesLine(byMonth, year){
  const canvas=document.getElementById('sales-line-chart');
  if(!canvas)return;
  const dpr=window.devicePixelRatio||1;
  const W=canvas.parentElement.clientWidth;const H=160;
  canvas.style.width=W+'px';canvas.style.height=H+'px';
  canvas.width=W*dpr;canvas.height=H*dpr;
  const ctx=canvas.getContext('2d');ctx.scale(dpr,dpr);
  const pad={t:14,r:10,b:28,l:44};
  const cw=W-pad.l-pad.r,ch=H-pad.t-pad.b;
  const allMonths=Array.from({length:12},(_,i)=>`${year}-${String(i+1).padStart(2,'0')}`);
  const revs=allMonths.map(m=>(byMonth[m]||{}).revenue||0);
  const pros=allMonths.map(m=>(byMonth[m]||{}).profit||0);
  const maxVal=Math.max(...revs,1);
  const gap=cw/12;
  const cx=i=>pad.l+gap*i+gap/2;
  const toY=v=>pad.t+ch-ch*(v/maxVal);
  ctx.clearRect(0,0,W,H);
  [0,0.5,1].forEach(f=>{
    const y=pad.t+ch-ch*f;
    ctx.strokeStyle='#e8e5de';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(pad.l,y);ctx.lineTo(pad.l+cw,y);ctx.stroke();
    ctx.fillStyle='#9a9488';ctx.font='8px -apple-system,sans-serif';ctx.textAlign='right';
    ctx.fillText(fmtMoney(maxVal*f),pad.l-3,y+3);
  });
  // bars
  const barW=Math.floor(gap*0.45);
  revs.forEach((v,i)=>{
    if(!v)return;
    const bh=ch*(v/maxVal);
    ctx.fillStyle='#9b6e2a88';
    ctx.beginPath();ctx.roundRect(cx(i)-barW/2,pad.t+ch-bh,barW,bh,2);ctx.fill();
  });
  // 매출 추세선
  ctx.beginPath();
  revs.forEach((v,i)=>{i===0?ctx.moveTo(cx(i),toY(v)):ctx.lineTo(cx(i),toY(v));});
  ctx.strokeStyle='#9b6e2a';ctx.lineWidth=2.5;ctx.lineJoin='round';ctx.stroke();
  // 순익 추세선
  ctx.beginPath();
  pros.forEach((v,i)=>{i===0?ctx.moveTo(cx(i),toY(v)):ctx.lineTo(cx(i),toY(v));});
  ctx.strokeStyle='#3d7a50';ctx.lineWidth=2;ctx.setLineDash([4,3]);ctx.stroke();ctx.setLineDash([]);
  // 월 레이블
  allMonths.forEach((_,i)=>{
    ctx.fillStyle='#9a9488';ctx.font='8px -apple-system,sans-serif';ctx.textAlign='center';
    ctx.fillText((i+1)+'월',cx(i),H-pad.b+12);
  });
}

let selectedEx='done';
function setEx(s){
  selectedEx=s;
  ['done','skip','holiday'].forEach(x=>{
    const b=document.getElementById('exbtn-'+x);
    if(b)b.className='ex-btn'+(x===s?' sel-'+x:'');

function renderExercise(){
  const now=new Date();
  const map={};loadEx().forEach(e=>map[e.date]=e);
  const yr=now.getFullYear(),mo=now.getMonth();
  const dim=new Date(yr,mo+1,0).getDate();

  // 이달 통계
  let target=0,done=0;
  for(let d=1;d<=dim;d++){
    const dt=new Date(yr,mo,d);
    const ds=toDate(dt);
    if(isWE(dt))continue;
    const rec=map[ds];
    if(rec&&rec.status==='holiday')continue;
    target++;
    if(rec&&rec.status==='done')done++;
  }
  const pct=target?Math.round(done/target*100):0;
  const goalFill=Math.min(Math.round(pct/80*100),100);
  document.getElementById('ex-pct-big').innerHTML=`${pct}<span style="font-size:18px;">%</span>`;
  document.getElementById('ex-done-count').textContent=done+'일';
  document.getElementById('ex-target-label').textContent=`/ ${target}일 (목표 ${Math.ceil(target*0.8)}일)`;
  document.getElementById('ex-goal-fill').style.width=goalFill+'%';
  document.getElementById('ex-goal-fill').style.background=pct>=80?'var(--green)':'var(--accent)';
  document.getElementById('ex-goal-status').textContent=pct>=80?'✓ 달성!':Math.ceil(target*0.8)-done+'일 남음';

  // 연속 출석
  let streak=0;let dt2=new Date();
  while(true){
    const ds=toDate(dt2);
    if(map[ds]&&map[ds].status==='done')streak++;
    else if(isWE(dt2)||(map[ds]&&map[ds].status==='holiday')){dt2.setDate(dt2.getDate()-1);continue;}
    else break;
    dt2.setDate(dt2.getDate()-1);
    if(streak>365)break;
  }
  document.getElementById('ex-streak').textContent=streak>0?`🔥 연속 ${streak}일`:'';

  // 오늘 레이블
  const today=toDate(new Date());
  const todayRec=map[today];
  document.getElementById('ex-today-label').textContent=`${now.getMonth()+1}/${now.getDate()} (${DOW[now.getDay()]}) 출석 체크`;
  if(todayRec)setEx(todayRec.status);
  else setEx('done');

  // 달력
  renderExCal(yr,mo,map);
}

function renderExCal(yr,mo,map){
  const dim=new Date(yr,mo+1,0).getDate();
  const firstDow=new Date(yr,mo,1).getDay();
  const todayStr=toDate(new Date());
  let html=`<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px;text-align:center;">`;
  // 요일 헤더
  DOW.forEach(d=>html+=`<div style="font-size:11px;font-weight:600;color:var(--text3);padding:4px 0;">${d}</div>`);
  // 빈칸
  for(let i=0;i<firstDow;i++)html+=`<div></div>`;
  // 날짜
  for(let d=1;d<=dim;d++){
    const dt=new Date(yr,mo,d);
    const ds=toDate(dt);
    const rec=map[ds];
    const isToday=ds===todayStr;
    const isWe=isWE(dt);
    let bg='transparent',color='var(--text3)',text=String(d);
    if(rec?.status==='done'){bg='var(--green-light)';color='var(--green)';}
    else if(rec?.status==='skip'){bg='var(--red-light)';color='var(--red)';}
    else if(rec?.status==='holiday'){bg='var(--blue-light)';color='var(--blue)';}
    else if(isWe){color='#c0b8b0';}
    const outline=isToday?'2px solid var(--accent)':'none';
    const icon=rec?.status==='done'?'✓':rec?.status==='skip'?'✗':rec?.status==='holiday'?'🏖':'';
    html+=`<div style="background:${bg};color:${color};border-radius:8px;padding:5px 2px;font-size:12px;font-weight:${isToday?700:400};outline:${outline};cursor:pointer;" onclick="exCalTap('${ds}')">
      <div>${d}</div>
      <div style="font-size:9px;">${icon}</div>
    </div>`;
  }
  html+=`</div>`;
  document.getElementById('ex-calendar').innerHTML=html;
}

function exCalTap(date){
  document.getElementById('ex-past-date').value=date;
  const map={};loadEx().forEach(e=>map[e.date]=e);
  const rec=map[date];
  if(rec) document.getElementById('ex-past-status').value=rec.status;
  document.getElementById('ex-past-date').scrollIntoView({behavior:'smooth'});
}

function saveEx(){
  const today=toDate(new Date());
  const data=loadEx().filter(e=>e.date!==today);
  const rec={date:today,status:selectedEx};
  data.push(rec);saveEx_(data);
  if(getApi())sheetsUpsert('exercise_log','date',rec);
  toast('✓ 출석 저장됐어요');
  renderExercise();
}
function saveExPast(){
  const date=document.getElementById('ex-past-date').value;
  const status=document.getElementById('ex-past-status').value;
  if(!date)return;
  const data=loadEx().filter(e=>e.date!==date);
  const rec={date,status};
  data.push(rec);saveEx_(data);
  if(getApi())sheetsUpsert('exercise_log','date',rec);
  toast('✓ 저장됐어요');
  renderExercise();
}

/* ══ 시작 ══ */
init();
</script>
</body>
